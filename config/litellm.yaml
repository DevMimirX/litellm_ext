      model: anthropic/MiniMax-M2.5
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

litellm_settings:
  # drop_params: true
  disable_spend_logs: false
  disable_spend_updates: false
  disable_end_user_cost_tracking: true
  turn_off_message_logging: false

general_settings:
  # Required for proxy auth + Admin UI login
  # Must start with "sk-"
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  # disable_spend_logs: true
  # disable_spend_updates: true
