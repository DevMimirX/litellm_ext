model_list:
  # -------- DeepSeek --------
  - model_name: deepseek-chat
    litellm_params:
      model: anthropic/deepseek-chat
      api_base: "https://api.deepseek.com/anthropic"
      api_key: os.environ/DEEPSEEK_API_KEY
      # max_tokens: 8192
      # additional_drop_params: ["max_tokens"]

  - model_name: deepseek-reasoner
    litellm_params:
      model: anthropic/deepseek-reasoner
      api_base: "https://api.deepseek.com/anthropic"
      api_key: os.environ/DEEPSEEK_API_KEY

  # -------- Zhipu / GLM (Z.AI) --------
  - model_name: glm-4.7
    litellm_params:
      model: anthropic/glm-4.7
      api_base: "https://api.z.ai/api/anthropic"
      api_key: os.environ/ZAI_API_KEY

  - model_name: glm-5
    litellm_params:
      model: anthropic/glm-5
      api_base: "https://api.z.ai/api/anthropic"
      api_key: os.environ/ZAI_API_KEY

  # -------- Moonshot / Kimi --------
  - model_name: kimi-k2.5
    litellm_params:
      model: anthropic/kimi-k2.5
      api_base: "https://api.moonshot.cn/anthropic"
      api_key: os.environ/MOONSHOT_API_KEY
      additional_drop_params:
        - reasoning_effort

  # -------- ByteDance / Doubao (Volcengine ARK Anthropic) --------
  - model_name: doubao-seed-2.0-code
    litellm_params:
      model: anthropic/doubao-seed-2.0-code
      api_base: "https://ark.cn-beijing.volces.com/api/coding"
      api_key: os.environ/ARK_API_KEY

  - model_name: glm-4.7-ark
    litellm_params:
      model: anthropic/glm-4.7
      api_base: "https://ark.cn-beijing.volces.com/api/coding"
      api_key: os.environ/ARK_API_KEY

  - model_name: kimi-k2.5-ark
    litellm_params:
      model: anthropic/kimi-k2.5
      api_base: "https://ark.cn-beijing.volces.com/api/coding"
      api_key: os.environ/ARK_API_KEY
      additional_drop_params:
        - reasoning_effort

  # -------- Alibaba Cloud / Coding Plan (DashScope Anthropic) --------
  - model_name: qwen3-max
    litellm_params:
      model: anthropic/qwen3-max-2026-01-23
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

  - model_name: qwen3-coder-plus
    litellm_params:
      model: anthropic/qwen3-coder-plus
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

  - model_name: qwen3.5-plus
    litellm_params:
      model: anthropic/qwen3.5-plus
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

  - model_name: kimi-k2.5-ali
    litellm_params:
      model: anthropic/kimi-k2.5
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

  - model_name: glm-5-ali
    litellm_params:
      model: anthropic/glm-5
      api_base: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: os.environ/QWEN_API_KEY

  - model_name: MiniMax-M2.5-ali
